<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --font:'Hiragino Sans','Hiragino Kaku Gothic ProN','YuGothic',sans-serif;
  --bg:#fff;--cell-bg:#fafafa;--text:#111;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --dot:#222;--today-bg:#111;--today-text:#fff;
  --sheet-bg:#fff;--handle:#ddd;
  --overlay:rgba(0,0,0,0.18);
  --sun:#e5503a;--sat:#3a7ee5;
  --r:10px;--rs:20px;
  --dur:0.46s;
  --tab-h:56px;
  --header-h:48px;
  --week-h:30px;
}
html,body{height:100%;overflow:hidden;touch-action:none;}
body{font-family:var(--font);background:var(--bg);color:var(--text);overscroll-behavior:none;display:flex;flex-direction:column;}

/* ─── TAB BAR ─── */
.tab-bar{
  display:flex;align-items:stretch;background:var(--bg);
  border-top:0.5px solid var(--border2);height:var(--tab-h);
  flex-shrink:0;order:2;position:relative;z-index:10;
  transition:opacity var(--dur) ease,transform var(--dur) ease;
}
.tab-bar.hidden{opacity:0;pointer-events:none;transform:translateY(100%);}
.tab{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);border-top:2px solid transparent;transition:color 0.15s;user-select:none;}
.tab.active{color:var(--text);border-top-color:var(--text);}
.tab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

/* ─── PAGES ─── */
.pages{flex:1;overflow:hidden;order:1;position:relative;}
.tab-page{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.tab-page.active{display:flex;}

/* ─── CAL HEADER (固定) ─── */
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 7px;background:var(--bg);flex-shrink:0;
  height:var(--header-h);
  border:none;border-bottom:none;
  position:relative;z-index:5;
}
.today-btn{font-size:11px;font-weight:600;color:var(--text2);border:0.5px solid #ddd;border-radius:6px;padding:4px 9px;cursor:pointer;background:none;font-family:var(--font);}
.drum-trigger{display:flex;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
.drum-label{font-size:17px;font-weight:700;letter-spacing:-0.5px;}
.drum-caret{font-size:10px;color:var(--text3);transition:transform 0.2s;}
.drum-caret.open{transform:rotate(180deg);}

/* ─── 年月セレクト (iOSネイティブドラムロール) ─── */
.ym-selects{display:flex;align-items:center;gap:2px;}
.ym-select{
  font-size:17px;font-weight:700;letter-spacing:-0.3px;
  color:var(--text);font-family:var(--font);
  background:none;border:none;outline:none;
  -webkit-appearance:none;appearance:none;
  /* タップ領域を確保しつつ見た目はテキストのみ */
  padding:4px 0;cursor:pointer;
}

/* ─── CALENDAR AREA ─── */
.cal-body{
  flex:1;background:#fff;display:flex;flex-direction:column;overflow:hidden;
  touch-action:none;
}
.cal-track-outer{flex:1;overflow:hidden;position:relative;}
.cal-track{display:flex;height:100%;will-change:transform;}
.cal-panel{
  flex:0 0 100%;height:100%;
  display:flex;flex-direction:column;
  overflow-y:auto;overscroll-behavior:contain;touch-action:pan-y;
  background:#fff;
}
.cal-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  padding:6px 10px 2px;background:#fff;flex-shrink:0;
}
.cal-weekday{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:2px 0;}
.cal-weekday:first-child{color:var(--sun);}
.cal-weekday:last-child{color:var(--sat);}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:4px 10px 16px;}
.day{
  height:56px;border-radius:var(--r);padding:6px 5px 4px;
  font-size:13px;font-weight:500;background:var(--cell-bg);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;
  transition:background 0.1s;
}
.day:active{background:#ececec;}
.day.other{opacity:0.4;}
.day.sun,.day.hol{color:var(--sun);}
.day.sat{color:var(--sat);}
.day.today .day-num{background:var(--today-bg);color:var(--today-text);}
/* タップ選択中の日付をうっすらハイライト */
.day.selected{background:#e8e8e8;}
.day.selected .day-num{font-weight:700;}
.day-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}
.dot{width:5px;height:5px;background:var(--dot);border-radius:50%;flex-shrink:0;}

/* ─── SEARCH / ADMIN ─── */
.center-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);font-size:14px;text-align:center;padding:32px;}
.center-msg .big{font-size:36px;}
.admin-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
.admin-form{padding:16px;display:flex;flex-direction:column;gap:12px;}
.form-row{display:flex;gap:10px;align-items:flex-start;}
.form-row .form-group{flex:1;min-width:0;}
.form-group{display:flex;flex-direction:column;gap:3px;width:100%;}
.form-label{font-size:10px;font-weight:600;color:var(--text2);}
.form-input{
  box-sizing:border-box;width:100%;
  background:#f4f4f4;border:0.5px solid #e0e0e0;
  border-radius:8px;padding:7px 10px;
  font-size:13px;color:var(--text);font-family:var(--font);outline:none;
  -webkit-appearance:none;appearance:none;display:block;
  height:34px; /* 全フィールド統一 */
}
.form-input:focus{border-color:#aaa;}

/* 書影アクションシート */
.img-trigger{
  cursor:pointer;display:flex;align-items:center;
  min-height:34px;
}
.img-action-overlay{
  position:fixed;inset:0;z-index:600;
  background:rgba(0,0,0,0);
  display:flex;align-items:flex-end;
  pointer-events:none;
  transition:background 0.32s ease;
}
.img-action-overlay.show{
  background:rgba(0,0,0,0.3);
  pointer-events:all;
}
.img-action-sheet{
  width:100%;background:#fff;border-radius:16px 16px 0 0;
  padding:8px 0 32px;
  transform:translateY(100%);
  transition:transform 0.36s cubic-bezier(0.23,1,0.32,1);
}
.img-action-overlay.show .img-action-sheet{transform:translateY(0);}
.img-action-title{text-align:center;font-size:12px;color:var(--text3);padding:8px 16px 10px;border-bottom:0.5px solid var(--border);}
.img-action-btn{display:block;width:100%;padding:15px 20px;text-align:left;font-size:15px;color:var(--text);background:none;border:none;border-bottom:0.5px solid var(--border);font-family:var(--font);cursor:pointer;}
.img-action-btn:last-child{border-bottom:none;}
.img-action-btn:active{background:#f5f5f5;}
.img-url-input-wrap{
  max-height:0;overflow:hidden;
  transition:max-height 0.28s cubic-bezier(0.23,1,0.32,1),padding 0.28s ease;
  padding:0 16px;
}
.img-url-input-wrap.show{max-height:120px;padding:10px 16px 4px;}
.img-url-input{box-sizing:border-box;width:100%;background:#f4f4f4;border:0.5px solid #e0e0e0;border-radius:8px;padding:7px 10px;font-size:13px;color:var(--text);font-family:var(--font);outline:none;}
.img-url-confirm{display:block;width:100%;margin:8px 0 0;background:#111;color:#fff;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;font-family:var(--font);cursor:pointer;}

/* ─── TOAST ─── */
.toast{
  position:fixed;bottom:calc(var(--tab-h) + 16px);left:50%;
  transform:translateX(-50%) translateY(0);
  background:rgba(30,30,30,0.88);color:#fff;
  font-size:13px;font-weight:500;
  padding:10px 20px;border-radius:20px;
  white-space:nowrap;z-index:900;
  opacity:0;pointer-events:none;
  transition:opacity 0.3s ease,transform 0.3s ease;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px);}
.optional-toggle{
  display:flex;align-items:center;gap:6px;
  font-size:11px;color:var(--text3);cursor:pointer;
  padding:2px 0;user-select:none;
}
.optional-toggle-arrow{font-size:9px;transition:transform 0.2s;}
.optional-toggle.open .optional-toggle-arrow{transform:rotate(90deg);}
.optional-fields{display:none;flex-direction:column;gap:12px;}
.optional-fields.show{display:flex;}

/* タグ行グループ — 自然なサイズで折り返し */
.tag-group{
  display:flex;flex-wrap:wrap;gap:5px;
}
.tags-pick-grouped{display:flex;flex-direction:column;gap:7px;margin-top:4px;}

.tag-pick-btn{
  font-size:11px;padding:5px 10px;border-radius:20px;
  border:1.5px solid #ddd;background:#fafafa;cursor:pointer;
  color:var(--text2);font-family:var(--font);
  transition:background 0.15s,color 0.15s,border-color 0.15s;
  white-space:nowrap;
}
.tag-pick-btn.on{}
.submit-btn{
  box-sizing:border-box;width:100%;
  background:#111;color:#fff;border:none;border-radius:10px;
  padding:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);
  margin-bottom:40px;
}

/* ─── OVERLAY ─── */
#overlay{
  position:fixed;inset:0;background:var(--overlay);z-index:100;
  opacity:0;pointer-events:none;
}
#overlay.active{opacity:1;pointer-events:all;}

#detail-overlay{
  position:fixed;inset:0;background:var(--overlay);z-index:250;
  opacity:0;pointer-events:none;
}
#detail-overlay.active{opacity:1;pointer-events:all;}

/* ─── SHEETS ─── */
.sheet{
  position:fixed;left:0;width:100%;bottom:0;
  background:var(--sheet-bg);
  will-change:transform;display:flex;flex-direction:column;overflow:hidden;
}
/* 初期位置は JS が初期化時に設定 */

/* 日付シート: もう少し下げる */
#date-sheet{
  z-index:200;
  top:calc(var(--header-h) + 80px);
  border-radius:var(--rs) var(--rs) 0 0;
}
/* 詳細シート: 日付シートの角丸(20px)分だけ下 */
#detail-sheet{
  z-index:300;
  top:calc(var(--header-h) + 100px);
  border-radius:12px 12px 0 0;
}
.handle-wrap{padding:10px 0 4px;display:flex;justify-content:center;flex-shrink:0;cursor:grab;user-select:none;}
.handle{width:40px;height:4px;background:var(--handle);border-radius:2px;}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px;flex-shrink:0;}
.sheet-title{font-size:15px;font-weight:700;}

/* ─── DATE SHEET (指追従スワイプ) ─── */
.date-viewport{flex:1;overflow:hidden;position:relative;touch-action:none;}
.date-track{display:flex;height:100%;will-change:transform;}
.date-panel{flex:0 0 100%;height:100%;overflow-y:auto;overscroll-behavior:contain;touch-action:pan-y;}
.view-toggle-btn{width:32px;height:32px;border:none;background:#f2f2f2;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ─── LIST / CARD ─── */
.list-view{display:flex;flex-direction:column;}
.list-item{display:flex;align-items:flex-start;gap:12px;padding:10px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:#fafafa;}
.thumb{width:52px;height:72px;background:#e8e8e8;border-radius:4px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#888;text-align:center;line-height:1.3;padding:3px;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.list-info{flex:1;min-width:0;}
.list-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;}
.card{aspect-ratio:2/3;background:#eee;border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,0.09);overflow:hidden;cursor:pointer;position:relative;transition:transform 0.12s;}
.card:active{transform:scale(0.97);}
.card img{width:100%;height:100%;object-fit:cover;display:block;}
.card-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#ebebeb;font-size:10px;font-weight:600;color:#888;text-align:center;padding:8px;line-height:1.4;}
.card-over{position:absolute;bottom:0;left:0;right:0;padding:18px 5px 5px;background:linear-gradient(transparent,rgba(0,0,0,0.42));display:flex;flex-wrap:wrap;gap:2px;}
.card-tag{font-size:9px;font-weight:600;color:#fff;background:rgba(255,255,255,0.18);padding:1px 5px;border-radius:20px;}
.empty{padding:36px 16px;text-align:center;color:var(--text3);font-size:13px;}

/* ─── DETAIL ─── */
.detail-cover-zone{
  position:relative;overflow:hidden;
  height:220px;flex-shrink:0;
  display:flex;align-items:stretch;
}
/* 左右ブラー背景 */
.detail-cover-side-l,.detail-cover-side-r{
  flex:1;overflow:hidden;position:relative;
}
.detail-cover-side-l img,.detail-cover-side-r img{
  position:absolute;top:0;height:100%;width:auto;
  object-fit:cover;
  filter:blur(16px);opacity:0.45;transform:scale(1.1);
}
.detail-cover-side-l img{right:0;}
.detail-cover-side-r img{left:0;}
/* 中央書影 */
.detail-cover-center{
  flex-shrink:0;display:flex;align-items:center;justify-content:center;
  position:relative;z-index:1;padding:12px 0;
}
.detail-cover-center img{
  height:196px;width:auto;object-fit:contain;display:block;
  box-shadow:0 4px 20px rgba(0,0,0,0.2);border-radius:3px;
}
.detail-cover-center .cover-ph{
  width:130px;height:196px;display:flex;align-items:center;justify-content:center;
  background:#e0e0e0;font-size:11px;color:#888;text-align:center;padding:6px;line-height:1.4;
  border-radius:3px;
}
.detail-body{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:0 20px 32px;touch-action:pan-y;}
.detail-title{font-size:17px;font-weight:700;line-height:1.55;padding:16px 0 6px;margin-bottom:8px;}
.detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.detail-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.meta-rows{display:flex;flex-direction:column;}
.meta-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.meta-row:last-of-type{border-bottom:none;}
.meta-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--text3);}
.meta-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.meta-val{color:var(--text);flex:1;}
.url-btn{display:flex;align-items:center;gap:12px;padding:10px 0;width:100%;border:none;background:none;cursor:pointer;font-family:var(--font);border-bottom:0.5px solid var(--border);text-decoration:none;color:var(--text);}
.url-btn-icon{width:20px;height:20px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#e47911;}
.url-btn-icon svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}
.url-btn-label{font-size:13px;font-weight:500;color:#e47911;}
.timestamps{padding:12px 0 0;text-align:right;font-size:11px;color:var(--text3);line-height:1.9;}
</style>
</head>
<body>

<div class="pages">

  <!-- カレンダータブ -->
  <div class="tab-page active" id="tab-calendar">
    <!-- 年月ヘッダー -->
    <div class="cal-header">
      <div class="ym-selects">
        <select class="ym-select" id="ymYearSel"></select>
        <select class="ym-select" id="ymMonthSel"></select>
      </div>
      <button class="today-btn" id="todayBtn">今日</button>
    </div>

    <!-- 曜日+グリッドをまとめてスワイプ — 1ブロック、全白 -->
    <div class="cal-body" id="calBody">
      <div class="cal-track-outer">
        <div class="cal-track" id="calTrack">
          <div class="cal-panel">
            <div class="cal-weekdays"><div class="cal-weekday">日</div><div class="cal-weekday">月</div><div class="cal-weekday">火</div><div class="cal-weekday">水</div><div class="cal-weekday">木</div><div class="cal-weekday">金</div><div class="cal-weekday">土</div></div>
            <div class="calendar" id="calGridPrev"></div>
          </div>
          <div class="cal-panel">
            <div class="cal-weekdays"><div class="cal-weekday">日</div><div class="cal-weekday">月</div><div class="cal-weekday">火</div><div class="cal-weekday">水</div><div class="cal-weekday">木</div><div class="cal-weekday">金</div><div class="cal-weekday">土</div></div>
            <div class="calendar" id="calGridCurr"></div>
          </div>
          <div class="cal-panel">
            <div class="cal-weekdays"><div class="cal-weekday">日</div><div class="cal-weekday">月</div><div class="cal-weekday">火</div><div class="cal-weekday">水</div><div class="cal-weekday">木</div><div class="cal-weekday">金</div><div class="cal-weekday">土</div></div>
            <div class="calendar" id="calGridNext"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 検索タブ -->
  <div class="tab-page" id="tab-search">
    <div class="center-msg"><div class="big">🔍</div><div>検索機能は近日公開予定です</div></div>
  </div>

  <!-- 管理タブ -->
  <div class="tab-page" id="tab-admin">
    <div class="admin-scroll" id="adminScroll">
      <div class="admin-form">
        <div class="form-group"><label class="form-label">タイトル *</label><input class="form-input" id="f-title" type="text" placeholder="参考書のタイトル"></div>

        <!-- 発売日 + 書影 -->
        <div class="form-row">
          <div class="form-group"><label class="form-label">発売日 *</label><input class="form-input" id="f-date" type="date"></div>
          <div class="form-group">
            <label class="form-label">書影</label>
            <div class="form-input img-trigger" id="imgTrigger">
              <span id="imgTriggerLabel" style="color:var(--text3);">タップして選択…</span>
            </div>
            <input type="file" id="f-img-file" accept="image/*" style="display:none;">
            <input type="text" id="f-img" style="display:none;">
          </div>
        </div>

        <!-- 著者 + 出版社 -->
        <div class="form-row">
          <div class="form-group"><label class="form-label">著者</label><input class="form-input" id="f-author" type="text" placeholder="著者名"></div>
          <div class="form-group"><label class="form-label">出版社</label><input class="form-input" id="f-publisher" type="text" placeholder="出版社名"></div>
        </div>

        <div class="form-group"><label class="form-label">科目タグ</label><div class="tags-pick-grouped" id="tags-pick-grouped"></div></div>

        <!-- オプション (URL, ISBN) -->
        <div class="optional-toggle" id="optionalToggle">
          <span class="optional-toggle-arrow">▶</span>
          <span>オプション（URL・ISBN）</span>
        </div>
        <div class="optional-fields" id="optionalFields">
          <div class="form-group"><label class="form-label">URL</label><input class="form-input" id="f-amazon" type="text" placeholder="https://…"></div>
          <div class="form-group"><label class="form-label">ISBN</label><input class="form-input" id="f-isbn" type="text" placeholder="978-4-…"></div>
        </div>

        <button class="submit-btn" id="submit-btn">登録する</button>
      </div>
    </div>
  </div>
</div>

<!-- タブバー -->
<div class="tab-bar" id="tabBar">
  <div class="tab active" data-tab="calendar">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
  </div>
  <div class="tab" data-tab="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
  </div>
  <div class="tab" data-tab="admin">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </div>
</div>

<!-- オーバーレイ -->
<div id="overlay"></div>
<!-- 詳細モーダル用中間オーバーレイ (日付シートを暗くする) -->
<div id="detail-overlay"></div>


<div class="sheet" id="date-sheet">
  <div class="handle-wrap"><div class="handle"></div></div>
  <div class="sheet-header">

/* ── YEAR/MONTH NATIVE SELECT ── */
function buildSelects(){

    let y=curYear,m=nm;
    while(m<0){m+=12;y--;}
    while(m>11){m-=12;y++;}
    const o=document.createElement('option');
    o.value=`${y}-${m}`;
    o.textContent=`${y}年${m+1}月`;
    if(y===curYear&&m===curMonth)o.selected=true;

/* ── CALENDAR ── */
function buildGrid(el,y,m){
  el.innerHTML='';
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const cells=Math.ceil((first.getDay()+last.getDate())/7)*7;
  for(let i=0;i<cells;i++){
    const d=new Date(y,m,i-first.getDay()+1);
    const s=ds(d),isOther=d.getMonth()!==m,dow=d.getDay(),hol=HOLIDAYS.has(s);
    const hasB=books.some(b=>b.date===s);
    const div=document.createElement('div');
    let cls='day';
    if(isOther)cls+=' other';if(s===todayStr)cls+=' today';
    if(dow===0||hol)cls+=' sun';else if(dow===6)cls+=' sat';
    div.className=cls;
    div.dataset.date=s;
    div.innerHTML=`<div class="day-num">${d.getDate()}</div>${hasB?'<div class="dot"></div>':''}`;
    div.addEventListener('click',()=>{if(dateOpen)return;openDate(s);});
    el.appendChild(div);
  }
}
function renderCal(){
  const p=addM(curYear,curMonth,-1),n=addM(curYear,curMonth,1);
  buildGrid(document.getElementById('calGridPrev'),p.y,p.m);
  buildGrid(document.getElementById('calGridCurr'),curYear,curMonth);
  buildGrid(document.getElementById('calGridNext'),n.y,n.m);
  syncSelects();
  const track=document.getElementById('calTrack');
  track.style.transition='none';
  track.style.transform='translateX(-100%)';
}

/* カレンダー横スワイプ (cal-body全体で受け取り、グリッドのみ動く) */
(()=>{
  const vp=document.getElementById('calBody');
  const track=document.getElementById('calTrack');
  const W=()=>vp.offsetWidth;
  let sx=0,sy=0,tracking=false,dragging=false;

  vp.addEventListener('touchstart',e=>{
    if(dateOpen)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
    tracking=true;dragging=false;
    track.style.transition='none';
  },{passive:true});

  vp.addEventListener('touchmove',e=>{
    if(!tracking)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!dragging){if(Math.abs(dx)<Math.abs(dy))return;dragging=true;}
    track.style.transform=`translateX(${-W()+dx}px)`;
  },{passive:true});

  vp.addEventListener('touchend',e=>{
    if(!tracking)return;tracking=false;
    if(!dragging)return;dragging=false;
    const dx=e.changedTouches[0].clientX-sx,w=W();
    track.style.transition=`transform 0.42s cubic-bezier(0.23,1,0.32,1)`;
    if(Math.abs(dx)>w*0.2){
      if(dx<0){
        track.style.transform=`translateX(${-w*2}px)`;
        setTimeout(()=>{const n=addM(curYear,curMonth,1);curYear=n.y;curMonth=n.m;renderCal();},420);
      }else{
        track.style.transform=`translateX(0px)`;
        setTimeout(()=>{const n=addM(curYear,curMonth,-1);curYear=n.y;curMonth=n.m;renderCal();},420);
      }
    }else{
      track.style.transform=`translateX(${-w}px)`;
    }
  },{passive:true});
})();

  if(b.isbn)rows+=`<div class="meta-row"><span class="meta-icon">${iconHash}</span><span class="meta-val">${b.isbn}</span></div>`;
  const urlBtn=b.amazon?`<a class="url-btn" href="${b.amazon}" target="_blank"><span class="url-btn-icon">${iconLink}</span><span class="url-btn-label">リンクを開く</span></a>`:'';

  document.getElementById('detailBody').innerHTML=`
    <div class="detail-title">${b.title}</div>
    <div class="detail-tags">${b.tags.map(t=>`<span class="detail-tag" style="${tagStyle(t)}">${tagDisp(t)}</span>`).join('')}</div>
    <div class="meta-rows">${rows}</div>
    ${urlBtn}
    <div class="timestamps">作成：${b.created}<br>更新：${b.updated}</div>`;
}

/* ══════════════════════════════════════════
   SHEET & OVERLAY SYSTEM
   - シートの translateY を JS が直接制御
   - overlay opacity は translateY に常時連動
   - 開く/閉じる/スワイプ すべて同じ仕組み
══════════════════════════════════════════ */
const OVERLAY_OPACITY = 0.28;
const SHEET_DUR = 480; // ms
const EASE = t => 1 - Math.pow(1 - t, 4); // easeOutQuart

// シートごとのアニメーション状態
const sheetState = {};

function getTravelDist(sheetEl){
  const top = parseFloat(window.getComputedStyle(sheetEl).top) || 0;
  return window.innerHeight - top;
}

function setSheetY(sheetEl, y){
  sheetEl.style.transform = `translateY(${y}px)`;
}

function syncOverlay(sheetEl, overlayEl){
  if(!overlayEl) return;
  const dist = getTravelDist(sheetEl);
  const mat = new DOMMatrix(window.getComputedStyle(sheetEl).transform);
  const ty = Math.max(0, mat.m42);
  const progress = dist > 0 ? Math.max(0, Math.min(1, 1 - ty / dist)) : 0;
  overlayEl.style.opacity = progress * OVERLAY_OPACITY;
  overlayEl.style.pointerEvents = progress > 0 ? 'all' : 'none';
}

function animateSheet(sheetEl, fromY, toY, overlayEl, onDone){
  const state = sheetState[sheetEl.id] || {};
  if(state.raf) cancelAnimationFrame(state.raf);
  const start = performance.now();
  const dist = toY - fromY;
  function tick(now){
    const t = Math.min((now - start) / SHEET_DUR, 1);
    const y = fromY + dist * EASE(t);
    setSheetY(sheetEl, y);
    syncOverlay(sheetEl, overlayEl);
    if(t < 1){
      state.raf = requestAnimationFrame(tick);
    } else {
      state.raf = null;
      setSheetY(sheetEl, toY);
      syncOverlay(sheetEl, overlayEl);
      if(onDone) onDone();
    }
  }
  state.raf = requestAnimationFrame(tick);
  sheetState[sheetEl.id] = state;
}

function openSheet(sheetEl, overlayEl, onDone){
  const dist = getTravelDist(sheetEl);
  // 現在位置から取得（すでに少し動いている場合も対応）
  const mat = new DOMMatrix(window.getComputedStyle(sheetEl).transform);
  const curY = isNaN(mat.m42) ? dist : Math.max(0, mat.m42);
  sheetEl.style.transition = 'none';
  animateSheet(sheetEl, curY, 0, overlayEl, onDone);
}

function closeSheet(sheetEl, overlayEl, onDone){
  const dist = getTravelDist(sheetEl);
  const mat = new DOMMatrix(window.getComputedStyle(sheetEl).transform);
  const curY = isNaN(mat.m42) ? 0 : Math.max(0, mat.m42);
  sheetEl.style.transition = 'none';
  animateSheet(sheetEl, curY, dist, overlayEl, ()=>{
    if(overlayEl){ overlayEl.style.opacity=0; overlayEl.style.pointerEvents='none'; }
    if(onDone) onDone();
  });
}

/* ─ open/close functions ─ */
function openDate(s){
  activeDate=s; setDateLabel(s); buildDatePanels(s);
  document.querySelectorAll('.day.selected').forEach(el=>el.classList.remove('selected'));
  document.querySelectorAll('.day').forEach(el=>{ if(el.dataset.date===s) el.classList.add('selected'); });
  if(!dateOpen){
    dateOpen=true;
    hideTabBar();
    openSheet(dateSheet, overlay);
  }
}
function closeDate(){
  if(!dateOpen) return;
  dateOpen=false; detailOpen=false;
  // detailシートも即座に初期位置へ
  const dist2 = getTravelDist(detailSheet);
  setSheetY(detailSheet, dist2);
  const dov = document.getElementById('detail-overlay');
  dov.style.opacity=0; dov.style.pointerEvents='none';
  closeSheet(dateSheet, overlay, ()=>{
    showTabBar();
    document.querySelectorAll('.day.selected').forEach(el=>el.classList.remove('selected'));
  });
}
function openDetail(b){
  setDetailContent(b);
  if(!detailOpen){
    detailOpen=true;
    const dov = document.getElementById('detail-overlay');
    openSheet(detailSheet, dov);
  }
}
function closeDetail(){
  if(!detailOpen) return;
  detailOpen=false;
  const dov = document.getElementById('detail-overlay');
  closeSheet(detailSheet, dov);
}

/* ─ swipe to close ─ */
function enableSwipe(sheetEl, closeFn, overlayEl){
  let sy=0, dy=0, t0=0, on=false, moved=false;
  sheetEl.addEventListener('touchstart', e=>{
    let el=e.target;
    while(el&&el!==sheetEl){ if(el.scrollTop>0&&el.scrollHeight>el.clientHeight) return; el=el.parentElement; }
    on=true; moved=false; dy=0; sy=e.touches[0].clientY; t0=Date.now();
    // 進行中アニメを止める
    const state = sheetState[sheetEl.id]||{};
    if(state.raf){ cancelAnimationFrame(state.raf); state.raf=null; }
    sheetEl.style.transition='none';
  },{passive:true});
  sheetEl.addEventListener('touchmove', e=>{
    if(!on) return;
    const d = e.touches[0].clientY - sy;
    if(d>5){
      moved=true; dy=d;
      setSheetY(sheetEl, d);
      syncOverlay(sheetEl, overlayEl);
    }
    if(e.cancelable) e.preventDefault();
  },{passive:false});
  sheetEl.addEventListener('touchend', ()=>{
    if(!on) return; on=false;
    const vel = dy/(Date.now()-t0);
    const closing = moved && (dy > getTravelDist(sheetEl)*0.25 || vel>0.4);
    if(closing){
      closeFn();
    } else {
      // 元の位置に戻す
      const mat = new DOMMatrix(window.getComputedStyle(sheetEl).transform);
      const curY = Math.max(0, mat.m42);
      animateSheet(sheetEl, curY, 0, overlayEl);
    }
    dy=0;
  });
}
enableSwipe(dateSheet, closeDate, overlay);
enableSwipe(detailSheet, closeDetail, document.getElementById('detail-overlay'));

/* ── INIT SHEET POSITIONS ── */
setTimeout(()=>{
  [dateSheet,detailSheet].forEach(sh=>{
    setSheetY(sh, getTravelDist(sh));
  });
},0);

const tagPickGrouped=document.getElementById('tags-pick-grouped');

function applyTagBtnStyle(btn,on){
  const t=btn.dataset.tag;
  const c=TAG_COLOR[t];
  if(on&&c){
    btn.style.background=c[0];
    btn.style.color=c[1];
    btn.style.borderColor=c[1];
  }else{
    btn.style.background='';
    btn.style.color='';
    btn.style.borderColor='';
  }
}

TAG_GROUPS.forEach(group=>{
  const wrap=document.createElement('div');
  const row=document.createElement('div');
  row.className='tag-group';
  group.tags.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tag-pick-btn';btn.textContent=tagDisp(t);btn.dataset.tag=t;btn.type='button';
    btn.addEventListener('click',()=>{
      btn.classList.toggle('on');
      applyTagBtnStyle(btn,btn.classList.contains('on'));
    });
    row.appendChild(btn);
  });
  wrap.appendChild(row);
  tagPickGrouped.appendChild(wrap);
});

/* ── TOAST ── */
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2000);
}
let imgMode = 'none'; // 'url' | 'file' | 'none'
let imgFileDataUrl = '';

const imgActionOverlay = document.getElementById('imgActionOverlay');
const imgTrigger = document.getElementById('imgTrigger');
const imgTriggerLabel = document.getElementById('imgTriggerLabel');

function openImgAction(){
  imgActionOverlay.classList.add('show');
  document.getElementById('imgUrlInputWrap').classList.remove('show');
  document.getElementById('imgUrlInput').value='';
}
function closeImgAction(){ imgActionOverlay.classList.remove('show'); }

imgTrigger.addEventListener('click', openImgAction);

// URLを入力
document.getElementById('imgChooseUrl').addEventListener('click',()=>{
  document.getElementById('imgUrlInputWrap').classList.add('show');
});
document.getElementById('imgUrlConfirm').addEventListener('click',()=>{
  const url = document.getElementById('imgUrlInput').value.trim();
  if(url){
    imgMode='url';
    document.getElementById('f-img').value=url;
    imgTriggerLabel.textContent=url.length>30?url.substring(0,30)+'…':url;
    imgTriggerLabel.style.color='var(--text)';
  }
  closeImgAction();
});

document.getElementById('imgChooseFile').addEventListener('click',()=>{
  // iOSのSafari: ユーザーのタップイベント内で click() を呼ぶ必要がある
  // オーバーレイを閉じる前に発火させる
  document.getElementById('f-img-file').click();
  closeImgAction();
});
document.getElementById('f-img-file').addEventListener('change',e=>{
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    imgFileDataUrl=ev.target.result;
    imgMode='file';
    imgTriggerLabel.textContent=file.name;
    imgTriggerLabel.style.color='var(--text)';
  };
  reader.readAsDataURL(file);
});

document.getElementById('imgChooseCancel').addEventListener('click', closeImgAction);
imgActionOverlay.addEventListener('click',e=>{
  if(e.target===imgActionOverlay) closeImgAction();
});

// オプション開閉
document.getElementById('optionalToggle').addEventListener('click',()=>{
  const tog=document.getElementById('optionalToggle');
  const fields=document.getElementById('optionalFields');
  tog.classList.toggle('open');
  fields.classList.toggle('show');
});

document.getElementById('submit-btn').addEventListener('click',()=>{
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  if(!title||!date){alert('タイトルと発売日は必須です');return;}
  const selTags=[...document.querySelectorAll('.tag-pick-btn.on')].map(b=>b.dataset.tag);
  const now=new Date();
  const ts=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  const imgVal = imgMode==='file' ? imgFileDataUrl : document.getElementById('f-img').value.trim();
  books.push({
    id:Date.now(),title,
    author:document.getElementById('f-author').value.trim(),
    publisher:document.getElementById('f-publisher').value.trim(),
    date,tags:selTags,
    img:imgVal,
    amazon:document.getElementById('f-amazon').value.trim(),
    isbn:document.getElementById('f-isbn').value.trim(),
    created:ts,updated:ts
  });
  saveBooks();
  ['f-title','f-author','f-publisher','f-img','f-amazon','f-isbn'].forEach(id=>document.getElementById(id).value='');
  imgFileDataUrl='';
  imgMode='none';
  document.getElementById('f-img').value='';
  imgTriggerLabel.textContent='タップして選択…';
  imgTriggerLabel.style.color='var(--text3)';
  document.querySelectorAll('.tag-pick-btn.on').forEach(b=>{
    b.classList.remove('on');
    applyTagBtnStyle(b,false);
  });
  document.getElementById('adminScroll').scrollTop=0;
  showToast('登録しました');renderCal();
});
</script>
