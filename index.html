<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参考書カレンダー</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff;
  overscroll-behavior: none;
}

/* ヘッダー */
.header {
  padding: 12px;
  font-weight: bold;
}

/* カレンダー */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  padding: 10px;
}

.day {
  height: 60px;
  border-radius: 10px;
  padding: 6px;
  font-size: 14px;
  position: relative;
  background: #fafafa;
}

.dot {
  width: 6px;
  height: 6px;
  background: black;
  border-radius: 50%;
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
}

/* オーバーレイ */
#overlay {
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease;
}

#overlay.active {
  opacity: 1;
  pointer-events: auto;
}

/* ボトムシート */
.sheet, .detail {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  background: white;
  border-radius: 20px 20px 0 0;

  transform: translateY(0);
  transition: transform 0.35s ease; /* ←ここが重要 */
  will-change: transform;
}

.sheet {
  height: 70%;
  display: flex;
  flex-direction: column;
  overscroll-behavior: contain;
  transform: translateY(100%);
}

.detail {
  height: 80%;
  overflow-y: auto;
}

.sheet.active, .detail.active {
  transform: translateY(0%);
}

.handle {
  width: 40px;
  height: 4px;
  background: #ccc;
  border-radius: 2px;
  margin: 8px auto;
}

/* リスト */
.list-item {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.thumb {
  width: 40px;
  height: 60px;
  background: #ddd;
}

/* カード */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.card {
  height: 100px;
  background: #eee;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* メタ */
.meta {
  font-size: 12px;
  color: #888;
  padding: 10px;
  text-align: right;
}
</style>
</head>

<body>

<div class="header">2026年4月 ▼</div>
<div class="calendar" id="calendar"></div>

<div id="overlay"></div>

<!-- 日付シート -->
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div style="display:flex; justify-content:space-between; padding:10px;">
    <div id="dateTitle"></div>
    <button onclick="toggleView(event)">切替</button>
  </div>
  <div id="content"></div>
</div>

<!-- 詳細シート -->
<div class="detail" id="detail">
  <div class="handle"></div>
  <div style="padding:10px;">
    <h3>タイトル</h3>
    <p>出版社 / 著者</p>
    <button>Amazonで見る</button>
  </div>
  <div class="meta">
    更新: 2026/4/25 18:12<br>
    作成: 2026/4/25 10:00
  </div>
</div>

<script>
const data = {
  "2026-04-20": ["英語本A","英語本B"],
  "2026-04-22": ["現代文"],
  "2026-04-24": ["数学","共テ"]
};

const calendar = document.getElementById("calendar");
const sheet = document.getElementById("sheet");
const detail = document.getElementById("detail");
const overlay = document.getElementById("overlay");

for (let i = 1; i <= 30; i++) {
  const d = document.createElement("div");
  d.className = "day";
  d.innerText = i;

  const date = `2026-04-${String(i).padStart(2,"0")}`;
  if (data[date]) {
    const dot = document.createElement("div");
    dot.className = "dot";
    d.appendChild(dot);
  }

  d.onclick = () => openSheet(date);
  calendar.appendChild(d);
}

/* 表示モード保存 */
let isGrid = localStorage.getItem("view") === "grid";
let currentDate = "";

function toggleView(e) {
  e.stopPropagation(); // ←追加
  isGrid = !isGrid;
  localStorage.setItem("view", isGrid ? "grid" : "list");
  render(currentDate);
}

function openSheet(date) {
  currentDate = date;

  sheet.classList.add("active");
  overlay.classList.add("active");

  document.getElementById("dateTitle").innerText = date;
  render(date);

  // ←これ超重要（位置リセット）
  sheet.style.transition = "transform 0.35s ease";
  sheet.style.transform = "translateY(0%)";
}

function openDetail() {
  detail.classList.add("active");
  overlay.classList.add("active");

  detail.style.transition = "transform 0.35s ease";
  detail.style.transform = "translateY(0)";
}

/* 閉じる共通 */
function closeAll() {
  sheet.classList.remove("active");
  detail.classList.remove("active");
  overlay.classList.remove("active");
  overlay.classList.remove("detail-active"); // ←追加
}

overlay.addEventListener("click", closeAll);

/* 描画 */
function render(date) {
  const container = document.getElementById("content");
  container.innerHTML = "";

  const items = data[date] || [];

  if (items.length === 0) {
    container.innerHTML = "<p style='color:#aaa;padding:10px;'>新刊情報がありません</p>";
    return;
  }

  if (isGrid) {
    container.className = "grid";
    items.forEach(() => {
      const c = document.createElement("div");
      c.className = "card";
      c.onclick = (e) => {
        e.stopPropagation();
        openDetail();
      };
      container.appendChild(c);
    });
  } else {
    container.className = "";
    items.forEach(i => {
      const item = document.createElement("div");
      item.className = "list-item";
      item.innerHTML = "<div class='thumb'></div><div>"+i+"</div>";
      item.onclick = (e) => {
        e.stopPropagation();
        openDetail();
      };
      container.appendChild(item);
    });
  }
}

/* スワイプで閉じる */
function enableSwipeClose(element) {
  let startY = 0;
  let currentY = 0;
  let isDragging = false;

  const threshold = window.innerHeight * 0.5; // 半分基準

  element.addEventListener("touchstart", e => {
    startY = e.touches[0].clientY;
    isDragging = true;

    element.style.transition = "none"; // 指追従
  });

  element.addEventListener("touchmove", e => {
    if (!isDragging) return;

    currentY = e.touches[0].clientY;
    let diff = currentY - startY;

    if (diff > 0) {
      element.style.transform = `translateY(${diff}px)`;
    }
  });

  element.addEventListener("touchend", () => {
    if (!isDragging) return;

    isDragging = false;

    let diff = currentY - startY;
    let height = element.offsetHeight;

    element.style.transition = "transform 0.35s ease"; // ←戻す速度統一

    // ■① 半分以上出てる → 戻す（開く状態）
    if (diff < threshold) {
      element.style.transform = "translateY(0)";
    }

    // ■② 半分未満 → 閉じる
    else {
      element.style.transform = "translateY(100%)";

      setTimeout(() => {
        element.classList.remove("active");
        element.style.transform = "";

        if (!sheet.classList.contains("active") && !detail.classList.contains("active")) {
          overlay.classList.remove("active");
        }
      }, 350);
    }
  });
}

enableSwipeClose(sheet);
enableSwipeClose(detail);

/* 引っ張って更新防止 */
document.addEventListener('touchmove', function(e) {
  if (sheet.classList.contains('active') || detail.classList.contains('active')) {
    e.preventDefault();
  }
}, { passive: false });

</script>

</body>
</html>
