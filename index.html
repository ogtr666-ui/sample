<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --font:'Hiragino Sans','Hiragino Kaku Gothic ProN','YuGothic',sans-serif;
  --bg:#fff;--cell-bg:#fafafa;--text:#111;--text2:#666;--text3:#aaa;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --dot:#222;--today-bg:#111;--today-text:#fff;
  --sheet-bg:#fff;--handle:#ddd;
  --overlay:rgba(0,0,0,0.18);
  --sun:#e5503a;--sat:#3a7ee5;
  --r:10px;--rs:20px;
  --dur:0.46s;
  --tab-h:56px;
  --header-h:48px;
  --week-h:30px;
}
html,body{height:100%;overflow:hidden;touch-action:none;}
body{font-family:var(--font);background:var(--bg);color:var(--text);overscroll-behavior:none;display:flex;flex-direction:column;}

/* ─── TAB BAR ─── */
.tab-bar{
  display:flex;align-items:stretch;background:var(--bg);
  border-top:0.5px solid var(--border2);height:var(--tab-h);
  flex-shrink:0;order:2;position:relative;z-index:10;
  transition:opacity var(--dur) ease,transform var(--dur) ease;
}
.tab-bar.hidden{opacity:0;pointer-events:none;transform:translateY(100%);}
.tab{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);border-top:2px solid transparent;transition:color 0.15s;user-select:none;}
.tab.active{color:var(--text);border-top-color:var(--text);}
.tab svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round;}

/* ─── PAGES ─── */
.pages{flex:1;overflow:hidden;order:1;position:relative;}
.tab-page{position:absolute;inset:0;display:none;flex-direction:column;overflow:hidden;}
.tab-page.active{display:flex;}

/* ─── CAL HEADER (固定) ─── */
.cal-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 14px 7px;background:var(--bg);flex-shrink:0;
  height:var(--header-h);
  border:none;border-bottom:none;
  position:relative;z-index:5;
}
.today-btn{font-size:11px;font-weight:600;color:var(--text2);border:0.5px solid #ddd;border-radius:6px;padding:4px 9px;cursor:pointer;background:none;font-family:var(--font);}
.drum-trigger{display:flex;align-items:center;gap:3px;cursor:pointer;padding:4px 0;}
.drum-label{font-size:17px;font-weight:700;letter-spacing:-0.5px;}
.drum-caret{font-size:10px;color:var(--text3);transition:transform 0.2s;}
.drum-caret.open{transform:rotate(180deg);}

/* ─── 年月ドラムロール (ヘッダー直下ドロップダウン) ─── */
.ym-trigger{
  display:flex;align-items:center;gap:4px;cursor:pointer;padding:4px 0;
}
.ym-label{font-size:17px;font-weight:700;letter-spacing:-0.5px;}
.ym-caret{font-size:11px;color:var(--text3);transition:none;}

/* ヘッダー直下から出てくるドロップダウン */
#ym-sheet{
  /* .sheet の共通スタイルを上書き */
  position:fixed;
  top:calc(var(--header-h) + 16px);
  left:12px;right:12px;
  bottom:auto; /* ボトムシートではない */
  height:auto;
  transform:translateY(-16px);
  opacity:0;
  pointer-events:none;
  border-radius:16px;
  /* 半透明+ブラー */
  background:rgba(255,255,255,0.82);
  -webkit-backdrop-filter:blur(20px);
  backdrop-filter:blur(20px);
  border-bottom:0.5px solid rgba(0,0,0,0.08);
  box-shadow:0 8px 32px rgba(0,0,0,0.10);
  transition:transform 0.32s cubic-bezier(0.23,1,0.32,1),
             opacity 0.28s ease;
  z-index:400;
  overflow:visible;
}
#ym-sheet.open{
  transform:translateY(0);
  opacity:1;
  pointer-events:all;
}

.ym-drum-wrap{
  display:flex;justify-content:center;align-items:center;
  height:200px;position:relative;overflow:hidden;
  padding:0 16px 8px;
}
.ym-fade-t,.ym-fade-b{
  position:absolute;left:0;right:0;height:68px;z-index:3;pointer-events:none;
}
.ym-fade-t{top:0;background:linear-gradient(to bottom,rgba(255,255,255,0.82),transparent);}
.ym-fade-b{bottom:0;background:linear-gradient(to top,rgba(255,255,255,0.82),transparent);}

.ym-col{flex:1;overflow:hidden;position:relative;touch-action:none;cursor:grab;}
.ym-col-inner{display:flex;flex-direction:column;will-change:transform;}
.ym-item{
  height:44px;display:flex;align-items:center;justify-content:center;
  font-size:19px;font-weight:400;color:rgba(0,0,0,0.28);
  flex-shrink:0;user-select:none;
}
.ym-item.sel{color:var(--text);font-weight:600;font-size:23px;}
.ym-divider{width:0.5px;background:rgba(0,0,0,0.12);margin:16px 4px;flex-shrink:0;}

/* ─── CALENDAR AREA ─── */
.cal-body{
  flex:1;background:#fff;display:flex;flex-direction:column;overflow:hidden;
  touch-action:none;
}
.cal-track-outer{flex:1;overflow:hidden;position:relative;}
.cal-track{display:flex;height:100%;will-change:transform;}
.cal-panel{
  flex:0 0 100%;height:100%;
  display:flex;flex-direction:column;
  overflow-y:auto;overscroll-behavior:contain;touch-action:pan-y;
  background:#fff;
}
.cal-weekdays{
  display:grid;grid-template-columns:repeat(7,1fr);
  padding:6px 10px 2px;background:#fff;flex-shrink:0;
}
.cal-weekday{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:2px 0;}
.cal-weekday:first-child{color:var(--sun);}
.cal-weekday:last-child{color:var(--sat);}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;padding:4px 10px 16px;}
.day{
  height:56px;border-radius:var(--r);padding:6px 5px 4px;
  font-size:13px;font-weight:500;background:var(--cell-bg);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;
  transition:background 0.1s;
}
.day:active{background:#ececec;}
.day.other{opacity:0.4;}
.day.sun,.day.hol{color:var(--sun);}
.day.sat{color:var(--sat);}
.day.today .day-num{background:var(--today-bg);color:var(--today-text);}
/* タップ選択中の日付をうっすらハイライト */
.day.selected{background:#e8e8e8;}
.day.selected .day-num{font-weight:700;}
.day-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;}
.dot{width:5px;height:5px;background:var(--dot);border-radius:50%;flex-shrink:0;}

/* ─── SEARCH / ADMIN ─── */
.center-msg{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--text3);font-size:14px;text-align:center;padding:32px;}
.center-msg .big{font-size:36px;}
.admin-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;touch-action:pan-y;}
.admin-form{padding:16px;display:flex;flex-direction:column;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:4px;width:100%;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);}
.form-input{
  box-sizing:border-box;width:100%;
  background:#f4f4f4;border:0.5px solid #e0e0e0;
  border-radius:8px;padding:10px 12px;
  font-size:16px;color:var(--text);font-family:var(--font);outline:none;
  -webkit-appearance:none;appearance:none;display:block;
}
.form-input:focus{border-color:#aaa;}

/* タグ行グループ */
.tag-group{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:2px;}
.tag-group-label{font-size:10px;color:var(--text3);margin-bottom:2px;}
.tags-pick-grouped{display:flex;flex-direction:column;gap:8px;margin-top:4px;}

.tag-pick-btn{
  font-size:11px;padding:4px 10px;border-radius:20px;
  /* 常に1.5px確保でON/OFF切替時にレイアウトシフトなし */
  border:1.5px solid #ddd;background:#fafafa;cursor:pointer;
  color:var(--text2);font-family:var(--font);
  transition:background 0.15s,color 0.15s,border-color 0.15s;
}
.tag-pick-btn.on{/* 色はJS側インラインで付与、枠幅は変えない */}
.submit-btn{
  box-sizing:border-box;width:100%;
  background:#111;color:#fff;border:none;border-radius:10px;
  padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);
  margin-bottom:40px;
}

/* ─── OVERLAY ─── */
/* カレンダー全体（ヘッダー含む）を暗くする */
#overlay{
  position:fixed;inset:0;
  background:var(--overlay);z-index:100;
  opacity:0;pointer-events:none;transition:opacity 0.48s ease;
}
#overlay.active{opacity:1;pointer-events:all;}

/* 詳細モーダル用オーバーレイ:
   詳細を開くとき #overlay を非表示にしてこちらに切り替える。
   z-index は日付シート(200)より上、詳細シート(300)より下。
   これにより全体の暗さが変わらず二重にならない。 */
#detail-overlay{
  position:fixed;inset:0;
  background:var(--overlay);z-index:250;
  opacity:0;pointer-events:none;transition:opacity 0.48s ease;
}
#detail-overlay.active{opacity:1;pointer-events:all;}

/* ─── SHEETS ─── */
.sheet{
  position:fixed;left:0;width:100%;bottom:0;
  transform:translateY(100%);
  background:var(--sheet-bg);
  transition:transform 0.48s cubic-bezier(0.23,1,0.32,1);
  will-change:transform;display:flex;flex-direction:column;overflow:hidden;
}
.sheet.open{transform:translateY(0);}

/* 日付シート: もう少し下げる */
#date-sheet{
  z-index:200;
  top:calc(var(--header-h) + 80px);
  border-radius:var(--rs) var(--rs) 0 0;
}
/* 詳細シート: 日付シートの角丸(20px)分だけ下 */
#detail-sheet{
  z-index:300;
  top:calc(var(--header-h) + 100px);
  border-radius:12px 12px 0 0;
}
.handle-wrap{padding:10px 0 4px;display:flex;justify-content:center;flex-shrink:0;cursor:grab;user-select:none;}
.handle{width:40px;height:4px;background:var(--handle);border-radius:2px;}
.sheet-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px;flex-shrink:0;}
.sheet-title{font-size:15px;font-weight:700;}

/* ─── DATE SHEET (指追従スワイプ) ─── */
.date-viewport{flex:1;overflow:hidden;position:relative;touch-action:none;}
.date-track{display:flex;height:100%;will-change:transform;}
.date-panel{flex:0 0 100%;height:100%;overflow-y:auto;overscroll-behavior:contain;touch-action:pan-y;}
.view-toggle-btn{width:32px;height:32px;border:none;background:#f2f2f2;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* ─── LIST / CARD ─── */
.list-view{display:flex;flex-direction:column;}
.list-item{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background 0.1s;}
.list-item:last-child{border-bottom:none;}
.list-item:active{background:#fafafa;}
.thumb{width:52px;height:72px;background:#e8e8e8;border-radius:4px;flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#888;text-align:center;line-height:1.3;padding:3px;}
.thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.list-info{flex:1;min-width:0;}
.list-title{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:5px;}
.tags{display:flex;gap:4px;flex-wrap:wrap;}
.tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:20px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;}
.card{aspect-ratio:2/3;background:#eee;border-radius:var(--r);box-shadow:0 2px 8px rgba(0,0,0,0.09);overflow:hidden;cursor:pointer;position:relative;transition:transform 0.12s;}
.card:active{transform:scale(0.97);}
.card img{width:100%;height:100%;object-fit:cover;display:block;}
.card-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#ebebeb;font-size:10px;font-weight:600;color:#888;text-align:center;padding:8px;line-height:1.4;}
.card-over{position:absolute;bottom:0;left:0;right:0;padding:18px 5px 5px;background:linear-gradient(transparent,rgba(0,0,0,0.42));display:flex;flex-wrap:wrap;gap:2px;}
.card-tag{font-size:9px;font-weight:600;color:#fff;background:rgba(255,255,255,0.18);padding:1px 5px;border-radius:20px;}
.empty{padding:36px 16px;text-align:center;color:var(--text3);font-size:13px;}

/* ─── DETAIL ─── */
.detail-cover-zone{position:relative;overflow:hidden;height:200px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.detail-cover-side{position:absolute;inset:0;display:flex;}
.cover-side-l,.cover-side-r{flex:1;overflow:hidden;position:relative;}
.cover-side-l img,.cover-side-r img{position:absolute;top:0;height:100%;width:auto;object-fit:cover;filter:blur(18px);opacity:0.55;transform:scale(1.08);}
.cover-side-l img{right:0;}
.cover-side-r img{left:0;}
.cover-side-center{position:relative;z-index:1;flex-shrink:0;height:100%;display:flex;align-items:center;justify-content:center;}
.detail-cover-main{height:170px;width:auto;max-width:130px;border-radius:4px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.22);display:flex;align-items:center;justify-content:center;}
.detail-cover-main img{height:100%;width:auto;object-fit:contain;display:block;}
.detail-cover-main .cover-ph{width:110px;height:170px;display:flex;align-items:center;justify-content:center;background:#e0e0e0;font-size:11px;color:#888;text-align:center;padding:6px;line-height:1.4;}
.detail-body{flex:1;overflow-y:auto;overscroll-behavior:contain;padding:0 20px 32px;touch-action:pan-y;}
/* 区切り線なし、タグとの間隔を詰める */
.detail-title{font-size:17px;font-weight:700;line-height:1.55;padding:16px 0 6px;margin-bottom:8px;}
.detail-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:14px;}
.detail-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px;}
.meta-rows{display:flex;flex-direction:column;}
.meta-row{display:flex;align-items:baseline;gap:10px;padding:9px 0;border-bottom:0.5px solid var(--border);font-size:13px;}
.meta-row:last-of-type{border-bottom:none;}
.meta-label{color:var(--text3);font-size:11px;width:58px;flex-shrink:0;}
.meta-val{color:var(--text);flex:1;}
.amazon-btn{display:block;margin-top:14px;background:#FF9900;color:#111;text-align:center;text-decoration:none;font-weight:700;font-size:13px;padding:11px;border-radius:9px;}
.timestamps{margin-top:14px;text-align:right;font-size:11px;color:var(--text3);line-height:1.9;}
</style>
</head>
<body>

<div class="pages">

  <!-- カレンダータブ -->
  <div class="tab-page active" id="tab-calendar">
    <!-- 年月ヘッダー -->
    <div class="cal-header">
      <div class="ym-trigger" id="ymTrigger">
        <span class="ym-label" id="ymLabel">2026年4月</span>
        <span class="ym-caret" id="ymCaret">▼</span>
      </div>
      <button class="today-btn" id="todayBtn">今日</button>
    </div>

    <!-- 曜日+グリッドをまとめてスワイプ — 1ブロック、全白 -->
    <div class="cal-body" id="calBody">
      <div class="cal-track-outer">
        <div class="cal-track" id="calTrack">
          <div class="cal-panel">
            <div class="cal-weekdays"><div class="cal-weekday">日</div><div class="cal-weekday">月</div><div class="cal-weekday">火</div><div class="cal-weekday">水</div><div class="cal-weekday">木</div><div class="cal-weekday">金</div><div class="cal-weekday">土</div></div>
            <div class="calendar" id="calGridPrev"></div>
          </div>
          <div class="cal-panel">
            <div class="cal-weekdays"><div class="cal-weekday">日</div><div class="cal-weekday">月</div><div class="cal-weekday">火</div><div class="cal-weekday">水</div><div class="cal-weekday">木</div><div class="cal-weekday">金</div><div class="cal-weekday">土</div></div>
            <div class="calendar" id="calGridCurr"></div>
          </div>
          <div class="cal-panel">
            <div class="cal-weekdays"><div class="cal-weekday">日</div><div class="cal-weekday">月</div><div class="cal-weekday">火</div><div class="cal-weekday">水</div><div class="cal-weekday">木</div><div class="cal-weekday">金</div><div class="cal-weekday">土</div></div>
            <div class="calendar" id="calGridNext"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 検索タブ -->
  <div class="tab-page" id="tab-search">
    <div class="center-msg"><div class="big">🔍</div><div>検索機能は近日公開予定です</div></div>
  </div>

  <!-- 管理タブ -->
  <div class="tab-page" id="tab-admin">
    <div class="admin-scroll" id="adminScroll">
      <div class="admin-form">
        <div class="form-group"><label class="form-label">タイトル *</label><input class="form-input" id="f-title" type="text" placeholder="参考書のタイトル"></div>
        <div class="form-group"><label class="form-label">著者</label><input class="form-input" id="f-author" type="text" placeholder="著者名"></div>
        <div class="form-group"><label class="form-label">出版社</label><input class="form-input" id="f-publisher" type="text" placeholder="出版社名"></div>
        <div class="form-group"><label class="form-label">発売日 *</label><input class="form-input" id="f-date" type="date"></div>
        <div class="form-group"><label class="form-label">書影URL</label><input class="form-input" id="f-img" type="text" placeholder="https://…"></div>
        <div class="form-group"><label class="form-label">Amazonリンク</label><input class="form-input" id="f-amazon" type="text" placeholder="https://amazon.co.jp/…"></div>
        <div class="form-group"><label class="form-label">ISBN</label><input class="form-input" id="f-isbn" type="text" placeholder="978-4-…"></div>
        <div class="form-group">
          <label class="form-label">科目タグ</label>
          <div class="tags-pick-grouped" id="tags-pick-grouped"></div>
        </div>
        <button class="submit-btn" id="submit-btn">登録する</button>
      </div>
    </div>
  </div>
</div>

<!-- タブバー -->
<div class="tab-bar" id="tabBar">
  <div class="tab active" data-tab="calendar">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
  </div>
  <div class="tab" data-tab="search">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
  </div>
  <div class="tab" data-tab="admin">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
  </div>
</div>

<!-- オーバーレイ -->
<div id="overlay"></div>
<!-- 詳細モーダル用中間オーバーレイ (日付シートを暗くする) -->
<div id="detail-overlay"></div>

<!-- 年月ドラムロール (ヘッダー直下ドロップダウン) -->
<div id="ym-sheet">
  <div class="ym-drum-wrap">
    <div class="ym-fade-t"></div>
    <div class="ym-fade-b"></div>
    <div class="ym-col" id="ymColYear"><div class="ym-col-inner" id="ymInnerYear"></div></div>
    <div class="ym-divider"></div>
    <div class="ym-col" id="ymColMonth"><div class="ym-col-inner" id="ymInnerMonth"></div></div>
  </div>
</div>
<div class="sheet" id="date-sheet">
  <div class="handle-wrap"><div class="handle"></div></div>
  <div class="sheet-header">
    <div class="sheet-title" id="sheetDateLabel"></div>
    <button class="view-toggle-btn" id="viewToggle">
      <svg viewBox="0 0 16 16" fill="#666" width="16" height="16"><rect x="1" y="2" width="14" height="2" rx="1"/><rect x="1" y="7" width="14" height="2" rx="1"/><rect x="1" y="12" width="14" height="2" rx="1"/></svg>
    </button>
  </div>
  <div class="date-viewport">
    <div class="date-track" id="dateTrack">
      <div class="date-panel" id="datePanelPrev"></div>
      <div class="date-panel" id="datePanelCurr"></div>
      <div class="date-panel" id="datePanelNext"></div>
    </div>
  </div>
</div>

<!-- 詳細シート -->
<div class="sheet" id="detail-sheet">
  <div class="handle-wrap"><div class="handle"></div></div>
  <div class="sheet-header" style="padding-bottom:4px;">
    <div style="font-size:13px;font-weight:500;color:var(--text3);" id="detailDateLabel"></div>
  </div>
  <div class="detail-cover-zone" id="detailCoverZone"></div>
  <div class="detail-body" id="detailBody"></div>
</div>

<script>

function ds(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function addM(y,m,delta){let nm=m+delta,ny=y;while(nm<0){nm+=12;ny--}while(nm>11){nm-=12;ny++}return{y:ny,m:nm}}
function addDays(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return ds(d)}

/* ── YEAR/MONTH DRUM PICKER ── */
const YM_ITEM_H=44, YM_PAD=3;
const ymYears=[];for(let y=2020;y<=2030;y++)ymYears.push(y);
const ymMonths=Array.from({length:12},(_,i)=>i);

function syncLabel(){
  document.getElementById('ymLabel').textContent=`${curYear}年${curMonth+1}月`;
}

function buildYmDrum(innerId,items,labelFn,selIdx){
  const inner=document.getElementById(innerId);
  inner.innerHTML='';
  for(let i=0;i<YM_PAD;i++){const d=document.createElement('div');d.className='ym-item';inner.appendChild(d);}
  items.forEach((item,i)=>{
    const d=document.createElement('div');
    d.className='ym-item'+(i===selIdx?' sel':'');
    d.textContent=labelFn(item);
    inner.appendChild(d);
  });
  for(let i=0;i<YM_PAD;i++){const d=document.createElement('div');d.className='ym-item';inner.appendChild(d);}
  inner.style.transition='none';
  inner.style.transform=`translateY(${-selIdx*YM_ITEM_H}px)`;
}

function makeYmDrum(colId,innerId,items,onSelect){
  const col=document.getElementById(colId);
  const inner=document.getElementById(innerId);
  let startY=0,curIdx=0,dragging=false,lastY=0,velY=0;

  function clamp(i){return Math.max(0,Math.min(items.length-1,i));}
  function getTY(){const m=inner.style.transform.match(/translateY\(([^)]+)px\)/);return m?parseFloat(m[1]):0;}
  function snapTo(idx,anim=true){
    idx=clamp(idx);curIdx=idx;
    inner.style.transition=anim?'transform 0.22s cubic-bezier(0.25,0.46,0.45,0.94)':'none';
    inner.style.transform=`translateY(${-idx*YM_ITEM_H}px)`;
    inner.querySelectorAll('.ym-item').forEach((d,i)=>d.classList.toggle('sel',i-YM_PAD===idx));
    onSelect(items[idx]);
  }

  function onStart(e){
    dragging=true;
    const y=e.touches?e.touches[0].clientY:e.clientY;
    startY=y;lastY=y;velY=0;
    curIdx=Math.round(-getTY()/YM_ITEM_H);
    inner.style.transition='none';
    e.preventDefault();
  }
  function onMove(e){
    if(!dragging)return;
    const y=e.touches?e.touches[0].clientY:e.clientY;
    velY=y-lastY;lastY=y;
    const dy=y-startY;
    const rawIdx=curIdx-dy/YM_ITEM_H;
    const ci=clamp(rawIdx);
    // 端でゴムバンド感
    const rubber=-(rawIdx-ci)*YM_ITEM_H*0.25;
    inner.style.transform=`translateY(${-ci*YM_ITEM_H+rubber}px)`;
    inner.querySelectorAll('.ym-item').forEach((d,i)=>d.classList.toggle('sel',Math.round(i-YM_PAD)===Math.round(rawIdx)));
    e.preventDefault();
  }
  function onEnd(e){
    if(!dragging)return;dragging=false;
    const dy=(e.touches?e.changedTouches[0].clientY:e.clientY)-startY;
    const momentum=velY/YM_ITEM_H*5;
    snapTo(Math.round(curIdx-dy/YM_ITEM_H-momentum));
  }

  col.addEventListener('touchstart',onStart,{passive:false});
  col.addEventListener('touchmove',onMove,{passive:false});
  col.addEventListener('touchend',onEnd,{passive:true});
  col.addEventListener('mousedown',onStart);
  window.addEventListener('mousemove',e=>{if(dragging)onMove(e);});
  window.addEventListener('mouseup',e=>{if(dragging)onEnd(e);});
}

function openYmSheet(){
  ymSelYear=curYear;ymSelMonth=curMonth;
  buildYmDrum('ymInnerYear',ymYears,y=>`${y}年`,ymYears.indexOf(ymSelYear));
  buildYmDrum('ymInnerMonth',ymMonths,m=>`${m+1}月`,ymSelMonth);
  makeYmDrum('ymColYear','ymInnerYear',ymYears,v=>ymSelYear=v);
  makeYmDrum('ymColMonth','ymInnerMonth',ymMonths,v=>ymSelMonth=v);
  ymSheet.classList.add('open');
  document.getElementById('ymCaret').textContent='▲';
  setTimeout(()=>document.addEventListener('touchstart',ymOutsideClose,{once:true,passive:true}),100);
}
function closeYmSheet(apply=true){

    curYear=ymSelYear;curMonth=ymSelMonth;

}
function ymOutsideClose(e){
  if(!ymSheet.contains(e.target)&&!document.getElementById('ymTrigger').contains(e.target)){

  }
}

/* ── CALENDAR ── */
function buildGrid(el,y,m){
  el.innerHTML='';
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  const cells=Math.ceil((first.getDay()+last.getDate())/7)*7;
  for(let i=0;i<cells;i++){
    const d=new Date(y,m,i-first.getDay()+1);
    const s=ds(d),isOther=d.getMonth()!==m,dow=d.getDay(),hol=HOLIDAYS.has(s);
    const hasB=books.some(b=>b.date===s);
    const div=document.createElement('div');
    let cls='day';
    if(isOther)cls+=' other';if(s===todayStr)cls+=' today';
    if(dow===0||hol)cls+=' sun';else if(dow===6)cls+=' sat';
    div.className=cls;
    div.dataset.date=s;
    div.innerHTML=`<div class="day-num">${d.getDate()}</div>${hasB?'<div class="dot"></div>':''}`;
    div.addEventListener('click',()=>{if(dateOpen)return;openDate(s);});
    el.appendChild(div);
  }
}
function renderCal(){
  const p=addM(curYear,curMonth,-1),n=addM(curYear,curMonth,1);
  buildGrid(document.getElementById('calGridPrev'),p.y,p.m);
  buildGrid(document.getElementById('calGridCurr'),curYear,curMonth);
  buildGrid(document.getElementById('calGridNext'),n.y,n.m);
  syncLabel();
  const track=document.getElementById('calTrack');
  track.style.transition='none';
  track.style.transform='translateX(-100%)';
}
renderCal();

/* カレンダー横スワイプ (cal-body全体で受け取り、グリッドのみ動く) */
(()=>{
  const vp=document.getElementById('calBody');
  const track=document.getElementById('calTrack');
  const W=()=>vp.offsetWidth;
  let sx=0,sy=0,tracking=false,dragging=false;

  vp.addEventListener('touchstart',e=>{
    if(dateOpen)return;
    sx=e.touches[0].clientX;sy=e.touches[0].clientY;
    tracking=true;dragging=false;
    track.style.transition='none';
  },{passive:true});

  vp.addEventListener('touchmove',e=>{
    if(!tracking)return;
    const dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;
    if(!dragging){if(Math.abs(dx)<Math.abs(dy))return;dragging=true;}
    track.style.transform=`translateX(${-W()+dx}px)`;
  },{passive:true});

  vp.addEventListener('touchend',e=>{
    if(!tracking)return;tracking=false;
    if(!dragging)return;dragging=false;
    const dx=e.changedTouches[0].clientX-sx,w=W();
    track.style.transition=`transform 0.42s cubic-bezier(0.23,1,0.32,1)`;
    if(Math.abs(dx)>w*0.2){
      if(dx<0){
        track.style.transform=`translateX(${-w*2}px)`;
        setTimeout(()=>{const n=addM(curYear,curMonth,1);curYear=n.y;curMonth=n.m;renderCal();},420);
      }else{
        track.style.transform=`translateX(0px)`;
        setTimeout(()=>{const n=addM(curYear,curMonth,-1);curYear=n.y;curMonth=n.m;renderCal();},420);
      }
    }else{
      track.style.transform=`translateX(${-w}px)`;
    }
  },{passive:true});
})();

function renderDay(el,s){
  const items=books.filter(b=>b.date===s);
  if(!items.length){el.innerHTML='<div class="empty">この日の新刊はありません</div>';return;}
  if(viewMode==='list'){
    el.innerHTML=`<div class="list-view">${items.map(b=>`
      <div class="list-item" data-id="${b.id}">
        <div class="thumb">${b.img?`<img src="${b.img}" alt="">`:b.title.substring(0,10)}</div>
        <div class="list-info">
          <div class="list-title">${b.title}</div>
          <div class="tags">${b.tags.map(t=>`<span class="tag" style="${tagStyle(t)}">${tagDisp(t)}</span>`).join('')}</div>
        </div>
      </div>`).join('')}</div>`;
  }else{
    el.innerHTML=`<div class="grid">${items.map(b=>`
      <div class="card" data-id="${b.id}">
        ${b.img?`<img src="${b.img}" alt="">`:`<div class="card-ph">${b.title.substring(0,14)}</div>`}
        <div class="card-over">${b.tags.slice(0,2).map(t=>`<span class="card-tag">${tagDisp(t)}</span>`).join('')}</div>

    <div class="detail-tags">${b.tags.map(t=>`<span class="detail-tag tag" style="${tagStyle(t)}">${tagDisp(t)}</span>`).join('')}</div>
    ${rows?`<div class="meta-rows">${rows}</div>`:''}
    ${b.amazon?`<a class="amazon-btn" href="${b.amazon}" target="_blank">Amazonで見る →</a>`:''}
    <div class="timestamps">作成：${b.created}<br>更新：${b.updated}</div>`;
}

/* ── SWIPE TO CLOSE ── */
const OVERLAY_OPACITY = 0.18; // --overlay と同値

function enableSwipe(sheetEl, closeFn, overlayEl){
  let sy=0,dy=0,t0=0,on=false,moved=false;
  sheetEl.addEventListener('touchstart',e=>{
    let el=e.target;
    while(el&&el!==sheetEl){if(el.scrollTop>0&&el.scrollHeight>el.clientHeight)return;el=el.parentElement;}
    on=true;moved=false;dy=0;sy=e.touches[0].clientY;t0=Date.now();
    sheetEl.style.transition='none';
    if(overlayEl) overlayEl.style.transition='none';
  },{passive:true});
  sheetEl.addEventListener('touchmove',e=>{
    if(!on)return;
    const d=e.touches[0].clientY-sy;
    if(d>5){
      moved=true;dy=d;
      sheetEl.style.transform=`translateY(${d}px)`;
      // シートの移動割合に応じてoverlay opacityを下げる
      if(overlayEl){
        const ratio=Math.min(d/sheetEl.offsetHeight,1);
        overlayEl.style.opacity=OVERLAY_OPACITY*(1-ratio);
      }
    }
    if(e.cancelable)e.preventDefault();
  },{passive:false});
  sheetEl.addEventListener('touchend',()=>{
    if(!on)return;on=false;
    const vel=dy/(Date.now()-t0);
    const closing=moved&&(dy>sheetEl.offsetHeight*0.25||vel>0.4);
    // シートとoverlayを同じイージングで揃える
    sheetEl.style.transition='transform 0.48s cubic-bezier(0.23,1,0.32,1)';
    sheetEl.style.transform='';
    if(overlayEl){
      overlayEl.style.transition='opacity 0.48s cubic-bezier(0.23,1,0.32,1)';
      overlayEl.style.opacity = closing ? '0' : OVERLAY_OPACITY;
      // 閉じ完了後にCSSクラスで管理し直す
      if(!closing) setTimeout(()=>{ overlayEl.style.opacity=''; overlayEl.style.transition=''; },480);
    }
    if(closing) closeFn();
    dy=0;
  });
}
enableSwipe(dateSheet, closeDate, overlay);
enableSwipe(detailSheet, closeDetail, document.getElementById('detail-overlay'));

/* ── ADMIN: グループ化タグ ── */
const tagPickGrouped=document.getElementById('tags-pick-grouped');

function applyTagBtnStyle(btn,on){
  const t=btn.dataset.tag;
  const c=TAG_COLOR[t];
  if(on&&c){
    btn.style.background=c[0];
    btn.style.color=c[1];
    btn.style.borderColor=c[1];
  }else{
    btn.style.background='';
    btn.style.color='';
    btn.style.borderColor='';
  }
}

TAG_GROUPS.forEach(group=>{
  const wrap=document.createElement('div');
  const row=document.createElement('div');
  row.className='tag-group';
  group.tags.forEach(t=>{
    const btn=document.createElement('button');
    btn.className='tag-pick-btn';btn.textContent=tagDisp(t);btn.dataset.tag=t;btn.type='button';
    btn.addEventListener('click',()=>{
      btn.classList.toggle('on');
      applyTagBtnStyle(btn,btn.classList.contains('on'));
    });
    row.appendChild(btn);
  });
  wrap.appendChild(row);
  tagPickGrouped.appendChild(wrap);
});

document.getElementById('submit-btn').addEventListener('click',()=>{
  const title=document.getElementById('f-title').value.trim();
  const date=document.getElementById('f-date').value;
  if(!title||!date){alert('タイトルと発売日は必須です');return;}
  const selTags=[...document.querySelectorAll('.tag-pick-btn.on')].map(b=>b.dataset.tag);
  const now=new Date();
  const ts=`${now.getFullYear()}/${String(now.getMonth()+1).padStart(2,'0')}/${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
  books.push({
    id:Date.now(),title,
    author:document.getElementById('f-author').value.trim(),
    publisher:document.getElementById('f-publisher').value.trim(),
    date,tags:selTags,
    img:document.getElementById('f-img').value.trim(),
    amazon:document.getElementById('f-amazon').value.trim(),
    isbn:document.getElementById('f-isbn').value.trim(),
    created:ts,updated:ts
  });
  saveBooks();
  ['f-title','f-author','f-publisher','f-img','f-amazon','f-isbn'].forEach(id=>document.getElementById(id).value='');
  document.querySelectorAll('.tag-pick-btn.on').forEach(b=>{
    b.classList.remove('on');
    applyTagBtnStyle(b,false);
  });
  document.getElementById('adminScroll').scrollTop=0;
  alert('登録しました');renderCal();
});
</script>
