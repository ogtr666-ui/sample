<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>参考書カレンダー</title>
<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #fff;
}

/* ヘッダー */
.header {
  padding: 12px;
  font-weight: bold;
}

/* カレンダー */
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
  padding: 10px;
}

.day {
  height: 60px;
  border-radius: 10px;
  padding: 6px;
  font-size: 14px;
  position: relative;
  background: #fafafa;
  cursor: pointer;
}

.dot {
  width: 6px;
  height: 6px;
  background: black;
  border-radius: 50%;
  position: absolute;
  bottom: 6px;
  left: 50%;
  transform: translateX(-50%);
}

/* ボトムシート */
.sheet {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 70%;
  background: white;
  border-radius: 20px 20px 0 0;
  box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
  transition: 0.3s;
  display: flex;
  flex-direction: column;
}

.sheet.active {
  bottom: 0;
}

.handle {
  width: 40px;
  height: 4px;
  background: #ccc;
  border-radius: 2px;
  margin: 8px auto;
}

/* リスト */
.list-item {
  display: flex;
  gap: 10px;
  padding: 10px;
}

.thumb {
  width: 40px;
  height: 60px;
  background: #ddd;
}

/* カード */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  padding: 10px;
}

.card {
  height: 100px;
  background: #eee;
  border-radius: 10px;
}

/* 詳細 */
.detail {
  position: fixed;
  bottom: -100%;
  left: 0;
  width: 100%;
  height: 80%;
  background: white;
  border-radius: 20px 20px 0 0;
  transition: 0.3s;
}

.detail.active {
  bottom: 0;
}

.meta {
  font-size: 12px;
  color: #888;
  padding: 10px;
  text-align: right;
}
</style>
</head>
<body>

<div class="header">2026年4月 ▼</div>

<div class="calendar" id="calendar"></div>

<!-- 日付シート -->
<div class="sheet" id="sheet">
  <div class="handle"></div>
  <div style="display:flex; justify-content:space-between; padding:10px;">
    <div id="dateTitle"></div>
    <button onclick="toggleView()">切替</button>
  </div>
  <div id="content"></div>
</div>

<!-- 詳細 -->
<div class="detail" id="detail">
  <div class="handle"></div>
  <div style="padding:10px;">
    <h3>タイトル</h3>
    <p>出版社 / 著者</p>
    <button>Amazonで見る</button>
  </div>
  <div class="meta">
    更新: 2026/4/25 18:12<br>
    作成: 2026/4/25 10:00
  </div>
</div>

<script>
const data = {
  "2026-04-20": ["英語本A","英語本B"],
  "2026-04-22": ["現代文"],
  "2026-04-24": ["数学","共テ"]
};

const calendar = document.getElementById("calendar");

for (let i = 1; i <= 30; i++) {
  const d = document.createElement("div");
  d.className = "day";
  d.innerText = i;

  const date = `2026-04-${String(i).padStart(2,"0")}`;
  if (data[date]) {
    const dot = document.createElement("div");
    dot.className = "dot";
    d.appendChild(dot);
  }

  d.onclick = () => openSheet(date);
  calendar.appendChild(d);
}

let isGrid = false;

function openSheet(date) {
  document.getElementById("sheet").classList.add("active");
  document.getElementById("dateTitle").innerText = date;
  render(date);
}

function toggleView() {
  isGrid = !isGrid;
  render(currentDate);
}

let currentDate = "";

function render(date) {
  currentDate = date;
  const container = document.getElementById("content");
  container.innerHTML = "";

  const items = data[date] || [];

  if (items.length === 0) {
    container.innerHTML = "<p style='color:#aaa;padding:10px;'>新刊情報がありません</p>";
    return;
  }

  if (isGrid) {
    container.className = "grid";
    items.forEach(i=>{
      const c = document.createElement("div");
      c.className = "card";
      c.onclick = openDetail;
      container.appendChild(c);
    });
  } else {
    container.className = "";
    items.forEach(i=>{
      const item = document.createElement("div");
      item.className = "list-item";
      item.innerHTML = "<div class='thumb'></div><div>"+i+"</div>";
      item.onclick = openDetail;
      container.appendChild(item);
    });
  }
}

function openDetail() {
  document.getElementById("detail").classList.add("active");
}
</script>

</body>
</html>
